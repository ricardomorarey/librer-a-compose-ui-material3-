# Genera la documentación de la API con Dokka y la publica en GitHub Pages
# en cada push a main.
name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  docs:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generar documentación con Dokka
        run: ./gradlew :library:dokkaGenerate --stacktrace

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Subir documentación
        uses: actions/upload-pages-artifact@v3
        with:
          path: library/build/dokka/html

      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
