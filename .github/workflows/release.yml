# Release automatizada: se lanza a mano desde la pestaña Actions indicando
# la versión nueva. El workflow:
#   1. Actualiza VERSION_NAME en gradle.properties y hace commit
#   2. Publica en Maven Central (firma incluida, en macOS con targets de iOS)
#   3. Crea la release en GitHub con el tag vX.Y.Z y notas generadas
#
# Nota: la release se crea con GITHUB_TOKEN, por lo que NO dispara el
# workflow publish.yml (así se evita publicar dos veces). publish.yml
# queda para releases creadas a mano en la web.
name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Versión a publicar (por ejemplo 0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Actualizar VERSION_NAME a ${{ inputs.version }}
        run: |
          sed -i '' "s/^VERSION_NAME=.*/VERSION_NAME=${{ inputs.version }}/" gradle.properties
          grep "^VERSION_NAME=" gradle.properties

      - name: Commit y push del cambio de versión
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gradle.properties
          git commit -m "Sube la versión a ${{ inputs.version }}"
          git push

      - name: Publicar en Maven Central
        run: ./gradlew publishAndReleaseToMavenCentral --no-configuration-cache --stacktrace
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}

      - name: Crear release en GitHub
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --target main \
            --title "v${{ inputs.version }}" \
            --generate-notes
