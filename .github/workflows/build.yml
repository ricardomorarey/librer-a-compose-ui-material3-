# Compila la librería en cada push y pull request.
name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compilar librería y demo
        run: ./gradlew :library:assemble :demo:desktopJar --stacktrace

      # Comprueba que la API pública no ha cambiado sin actualizar los
      # ficheros de library/api (ejecutar apiDump si el cambio es intencionado)
      - name: Validar compatibilidad binaria de la API
        run: ./gradlew :library:apiCheck --stacktrace

      # Renderiza todos los componentes a PNG con Compose Desktop:
      # sirve de smoke test de que ninguno rompe en tiempo de ejecución
      - name: Generar capturas del README
        run: ./gradlew :library:generateScreenshots --stacktrace
